<!DOCTYPE html>
<html lang="it">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Farma Smart — l'app di Baganza Farmacie a Parma: catalogo, servizi e assistente AI.">
  <link rel="canonical" href="https://www.farmaciabaganza.it/">

  <!-- Social preview (OpenGraph / Twitter). NOTE: this is the Flutter PWA
       shell; per-page SEO for crawlers is served by the SSR storefront — see
       docs/adr/0001-storefront-seo.md (§6.2, step 2.7). -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Baganza Farmacie">
  <meta property="og:title" content="Farma Smart — Baganza Farmacie">
  <meta property="og:description" content="Catalogo, servizi e assistente AI della Farmacia Baganza a Parma.">
  <meta property="og:image" content="https://www.farmaciabaganza.it/icons/Icon-512.png">
  <meta property="og:locale" content="it_IT">
  <meta property="og:locale:alternate" content="en_US">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Farma Smart — Baganza Farmacie">
  <meta name="twitter:description" content="Catalogo, servizi e assistente AI della Farmacia Baganza a Parma.">

  <!-- Organization structured data (site-wide). Product/FAQ/Breadcrumb JSON-LD
       is emitted per page by the SSR storefront (step 2.7 ADR). -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Pharmacy",
    "name": "Baganza Farmacie",
    "url": "https://www.farmaciabaganza.it/",
    "image": "https://www.farmaciabaganza.it/icons/Icon-512.png",
    "areaServed": "Parma, IT",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Parma",
      "addressRegion": "Emilia-Romagna",
      "addressCountry": "IT"
    }
  }
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Farma Smart">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Farma Smart</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
