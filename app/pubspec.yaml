name: baganza_app
description: Baganza Farmacie 3.0 — PWA e-commerce farmacia Parma.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.2

  # Routing
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_app_check: ^0.3.2+4

  # Locale persistence
  shared_preferences: ^2.5.2
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.2.0
  mobile_scanner: ^7.2.0
  cloud_functions: ^5.6.2
  image_picker: ^1.2.3
  url_launcher: ^6.3.1
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  fake_cloud_firestore: ^3.1.0
  firebase_storage_mocks: ^0.7.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
